<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ache o Botão</title>

<style>
body {
  margin: 0;
  height: 100vh;
  overflow: hidden;
  font-family: Arial;

  /* FUNDO MINECRAFT QUE FUNCIONA */
  background-image: url("https://wallpapercave.com/wp/wp2757874.jpg");
  background-size: cover;
  background-position: center;
}

/* escurecer */
.overlay {
  position: absolute;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.25);
}

/* título */
h1 {
  position: relative;
  z-index: 2;
  text-align: center;
  color: white;
  margin-top: 20px;
  font-size: 20px;
  text-shadow: 2px 2px 5px black;
}

/* BOTÃO (lado) */
.botao {
  position: absolute;
  width: 8px;
  height: 20px;
  background: #5c5c5c;
  border-left: 2px solid #2e2e2e;
  border-right: 1px solid #aaa;
  border-radius: 2px;
  z-index: 2;
}

/* POSIÇÕES (ajustadas p celular) */
#real { top: 60%; left: 80%; }
#fake1 { top: 45%; left: 20%; }
#fake2 { top: 72%; left: 40%; }

/* HITBOX (maior pra facilitar toque) */
.hitbox {
  position: absolute;
  width: 35px;
  height: 35px;
  z-index: 3;
}

#hitReal { top: 58%; left: 78%; }
#hitFake1 { top: 43%; left: 18%; }
#hitFake2 { top: 70%; left: 38%; }

/* CARTA */
#carta {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(0);

  width: 170px;
  height: 110px;
  background: white;
  border-radius: 10px;

  display: flex;
  align-items: center;
  justify-content: center;

  box-shadow: 0 10px 25px rgba(0,0,0,0.5);
  transition: 0.4s;
  z-index: 5;
}

/* coração desenhado */
.heart {
  width: 30px;
  height: 30px;
  background: red;
  transform: rotate(-45deg);
  position: relative;
}

.heart::before,
.heart::after {
  content: "";
  width: 30px;
  height: 30px;
  background: red;
  border-radius: 50%;
  position: absolute;
}

.heart::before { top: -15px; left: 0; }
.heart::after { left: 15px; top: 0; }

.show {
  transform: translate(-50%, -50%) scale(1);
}

/* MENSAGEM */
#msg {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(0);

  width: 260px;
  background: white;
  padding: 20px;
  border-radius: 12px;
  text-align: center;

  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
  transition: 0.4s;
  z-index: 6;
}

#msg.show {
  transform: translate(-50%, -50%) scale(1);
}

#msg h2 {
  color: #e91e63;
  font-size: 18px;
}

#msg button {
  margin-top: 12px;
  padding: 10px 15px;
  border: none;
  background: #4caf50;
  color: white;
  border-radius: 8px;
}
</style>
</head>

<body>

<div class="overlay"></div>

<h1>Ache o botão para seu presente</h1>

<!-- BOTÕES -->
<div class="botao" id="real"></div>
<div class="botao" id="fake1"></div>
<div class="botao" id="fake2"></div>

<!-- HITBOX -->
<div class="hitbox" id="hitReal"></div>
<div class="hitbox" id="hitFake1"></div>
<div class="hitbox" id="hitFake2"></div>

<!-- CARTA -->
<div id="carta">
  <div class="heart"></div>
</div>

<!-- MENSAGEM -->
<div id="msg">
  <h2>VOCÊ CONSEGUIUUUU, parabéns minha princesinha.</h2>
  <button onclick="ir()">Ver meu presente</button>
</div>

<script>
const carta = document.getElementById("carta");
const msg = document.getElementById("msg");

/* botão certo */
document.getElementById("hitReal").onclick = () => {
  carta.classList.add("show");
};

/* fake (sem aviso) */
document.getElementById("hitFake1").onclick = () => {};
document.getElementById("hitFake2").onclick = () => {};

/* abrir carta */
carta.onclick = () => {
  carta.style.display = "none";
  msg.classList.add("show");
};

function ir() {
  window.location.href = "https://ntzz1403.github.io/minha-nen-m-/";
}
</script>

</body>
</html>
