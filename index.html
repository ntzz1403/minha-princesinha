<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Uma cartinha pra você</title>

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: #f5d0e0;
  font-family: Arial;
}

/* envelope */
#envelope {
  width: 200px;
  height: 130px;
  background: #fff;
  position: relative;
  cursor: pointer;
  border-radius: 6px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.3);
}

/* aba do envelope */
#envelope::before {
  content: "";
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: #eee;
  clip-path: polygon(0 0, 50% 50%, 100% 0);
  transform-origin: top;
  transition: 0.6s;
}

/* coração */
.heart {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) rotate(-45deg);
  width: 20px;
  height: 20px;
  background: red;
}

.heart::before,
.heart::after {
  content: "";
  position: absolute;
  width: 20px;
  height: 20px;
  background: red;
  border-radius: 50%;
}

.heart::before { top: -10px; left: 0; }
.heart::after { left: 10px; top: 0; }

/* papel */
#papel {
  position: absolute;
  width: 180px;
  height: 120px;
  background: white;
  top: 10px;
  left: 10px;
  border-radius: 6px;
  text-align: center;
  padding-top: 20px;

  transform: translateY(40px);
  opacity: 0;
  transition: 0.6s;
}

/* aberto */
.aberto::before {
  transform: rotateX(180deg);
}

.aberto #papel {
  transform: translateY(-60px);
  opacity: 1;
}

/* texto */
#papel p {
  color: #e91e63;
  font-size: 16px;
  margin: 10px;
}

/* botão */
#papel button {
  margin-top: 10px;
  padding: 10px 15px;
  border: none;
  background: #4caf50;
  color: white;
  border-radius: 6px;
  cursor: pointer;
}
</style>
</head>

<body>

<div id="envelope">
  <div class="heart"></div>

  <div id="papel">
    <p>espero que goste meu amor</p>
    <button onclick="ir()">ver meu presente</button>
  </div>
</div>

<script>
const envelope = document.getElementById("envelope");

envelope.onclick = () => {
  envelope.classList.toggle("aberto");
};

function ir() {
  window.location.href = "https://ntzz1403.github.io/minha-nen-m-/";
}
</script>

</body>
</html>
